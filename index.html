<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VinylVault — Your Record Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f0b05;
  color: #e8d5a3;
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
}
.cabinet {
  max-width: 900px;
  margin: 24px auto;
  background: linear-gradient(160deg, #2e1f0a 0%, #1a1208 50%, #0f0b05 100%);
  border: 3px solid #5c3d1a;
  border-radius: 12px;
  padding: 28px;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 8px 40px rgba(0,0,0,0.9);
  position: relative;
}
.cabinet::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid #3d2710;
  border-radius: 8px;
  pointer-events: none;
}
.brand {
  text-align: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid #3d2710;
}
.brand-name {
  font-family: 'Special Elite', cursive;
  font-size: 32px;
  color: #c8962a;
  letter-spacing: 8px;
  text-shadow: 0 0 30px rgba(200,150,42,0.2);
}
.brand-sub {
  font-size: 10px;
  color: #6a4c1e;
  letter-spacing: 4px;
  margin-top: 4px;
  text-transform: uppercase;
}
.player-grid {
  display: grid;
  grid-template-columns: 290px 1fr;
  gap: 28px;
  align-items: start;
}
.turntable-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}
.platter-base {
  width: 250px;
  height: 250px;
  background: radial-gradient(circle at 40% 30%, #1a1a1a, #0a0a0a);
  border-radius: 50%;
  border: 4px solid #222;
  box-shadow: 0 6px 20px rgba(0,0,0,0.9), inset 0 2px 6px rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.record {
  width: 210px;
  height: 210px;
  border-radius: 50%;
  background: 
    repeating-conic-gradient(#111 0deg 3deg, #181818 3deg 6deg);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: transform 0.3s;
}
.record.spinning {
  animation: spin 2.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.record-label {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 8px;
  background: #8B1A1A;
  transition: background 0.5s;
  position: relative;
  z-index: 2;
}
.label-title {
  font-family: 'Special Elite', cursive;
  font-size: 7.5px;
  color: #f5e6c8;
  line-height: 1.25;
  max-width: 58px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}
.label-artist {
  font-size: 6px;
  color: #d4b896;
  margin-top: 3px;
  max-width: 58px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.spindle {
  position: absolute;
  width: 9px;
  height: 9px;
  background: #999;
  border-radius: 50%;
  border: 1px solid #666;
  z-index: 3;
}
/* Tonearm */
.tonearm-wrap {
  position: absolute;
  top: -8px;
  right: -18px;
  width: 70px;
  height: 110px;
}
.tonearm-pivot {
  position: absolute;
  top: 0; right: 12px;
  width: 16px; height: 16px;
  background: radial-gradient(circle at 40% 35%, #ccc, #888);
  border-radius: 50%;
  border: 2px solid #666;
}
.tonearm-arm {
  position: absolute;
  top: 6px; right: 18px;
  width: 7px; height: 95px;
  background: linear-gradient(180deg, #aaa 0%, #ccc 40%, #888 100%);
  border-radius: 3px;
  transform-origin: 3.5px 6px;
  transform: rotate(22deg);
  transition: transform 0.9s ease;
}
.tonearm-arm.playing { transform: rotate(33deg); }
.tonearm-head {
  position: absolute;
  bottom: 0; left: -3px;
  width: 13px; height: 8px;
  background: #aaa;
  border-radius: 2px;
}
/* Now playing panel */
.now-playing {
  background: #0a0803;
  border: 1px solid #2e1a08;
  border-radius: 6px;
  padding: 14px;
  width: 100%;
}
.np-led {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #3d2710;
  margin-right: 6px;
  vertical-align: middle;
  transition: background 0.3s;
}
.np-led.on { background: #c84a2a; box-shadow: 0 0 6px #c84a2a; }
.np-eyebrow {
  font-size: 9px;
  color: #5c3d1a;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.np-title {
  font-family: 'Special Elite', cursive;
  font-size: 17px;
  color: #e8b84a;
  line-height: 1.25;
  min-height: 44px;
}
.np-artist {
  font-size: 11px;
  color: #a07840;
  margin-top: 4px;
}
.np-meta {
  font-size: 10px;
  color: #4a3018;
  margin-top: 4px;
}
/* Controls */
.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  width: 100%;
}
.btn {
  background: #130e06;
  border: 2px solid #5c3d1a;
  border-radius: 5px;
  color: #c8962a;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  padding: 9px 14px;
  cursor: pointer;
  text-transform: uppercase;
  box-shadow: 0 3px 0 #3d2710;
  position: relative;
  top: 0;
  transition: top 0.08s, box-shadow 0.08s, background 0.1s;
  user-select: none;
}
.btn:hover { background: #1e1408; color: #e8b84a; }
.btn:active, .btn.down {
  top: 3px;
  box-shadow: 0 0 0 #3d2710;
  background: #0a0803;
}
.btn-play { border-color: #3a6e1a; color: #7ec84a; }
.btn-play:hover { background: #0f1a05; color: #9ee86a; }
.btn-play.down { color: #5ab832; }
.btn-tidal {
  flex: 1;
  background: #070e18;
  border-color: #1a3f6e;
  color: #4ab8e8;
  text-align: center;
}
.btn-tidal:hover { background: #0a1828; color: #6ae8ff; }
.btn-shuffle {
  background: #130e06;
  border-color: #5c3d1a;
  color: #c8962a;
}
.btn-shuffle:hover { background: #1e1408; color: #e8b84a; }
.btn-shuffle.spin-once { animation: shuffleSpin 0.35s ease; }
@keyframes shuffleSpin {
  0%   { transform: rotate(0deg) scale(1); }
  40%  { transform: rotate(180deg) scale(1.12); }
  100% { transform: rotate(360deg) scale(1); }
}
/* VU meter */
.vu {
  display: flex;
  gap: 2px;
  align-items: flex-end;
  height: 28px;
}
.vu-b {
  width: 4px;
  background: #2a1a08;
  border-radius: 1px;
  transition: height 0.08s;
}
/* Ticker */
.ticker {
  width: 100%;
  background: #080604;
  border: 1px solid #2a1a08;
  border-radius: 4px;
  padding: 7px 10px;
  overflow: hidden;
  white-space: nowrap;
}
.ticker-inner {
  display: inline-block;
  font-size: 10px;
  color: #5c3d1a;
  letter-spacing: 1px;
  animation: ticker 35s linear infinite;
}
@keyframes ticker {
  from { transform: translateX(320px); }
  to { transform: translateX(-100%); }
}
/* Library side */
.library { display: flex; flex-direction: column; gap: 10px; }
.search-row { display: flex; gap: 8px; }
.search-input {
  flex: 1;
  background: #0a0803;
  border: 1px solid #3d2710;
  border-radius: 4px;
  color: #e8d5a3;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  padding: 8px 12px;
  outline: none;
}
.search-input:focus { border-color: #7a5c2e; }
.search-input::placeholder { color: #3d2710; }
.sort-select {
  background: #0a0803;
  border: 1px solid #3d2710;
  border-radius: 4px;
  color: #a07840;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  padding: 8px 10px;
  outline: none;
  cursor: pointer;
}
.rec-count {
  font-size: 10px;
  color: #4a3018;
  letter-spacing: 1px;
}
.record-list {
  border: 1px solid #1e1208;
  border-radius: 4px;
  overflow-y: auto;
  max-height: 360px;
}
.record-list::-webkit-scrollbar { width: 5px; }
.record-list::-webkit-scrollbar-track { background: #0a0803; }
.record-list::-webkit-scrollbar-thumb { background: #2e1a08; border-radius: 3px; }
.rrow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-bottom: 1px solid #120d06;
  cursor: pointer;
  transition: background 0.12s;
}
.rrow:last-child { border-bottom: none; }
.rrow:hover { background: #180f06; }
.rrow.active { background: #221508; }
.rrow-info {}
.rrow-title { font-size: 12px; color: #e0c88a; line-height: 1.3; }
.rrow-artist { font-size: 10px; color: #6a4c1e; }
.rrow-year { font-size: 10px; color: #3d2710; white-space: nowrap; }
</style>
</head>
<body>
<div class="cabinet">
  <div class="brand">
    <div class="brand-name">VINYLVAULT</div>
    <div class="brand-sub">High Fidelity Record Library &middot; 696 Albums</div>
  </div>

  <div class="player-grid">
    <!-- Left: Turntable -->
    <div class="turntable-col">
      <div class="platter-base">
        <div class="record" id="record">
          <div class="record-label" id="recordLabel">
            <div class="label-title" id="labelTitle">SELECT A RECORD</div>
            <div class="label-artist" id="labelArtist"></div>
          </div>
          <div class="spindle"></div>
        </div>
        <div class="tonearm-wrap">
          <div class="tonearm-pivot"></div>
          <div class="tonearm-arm" id="tonearm">
            <div class="tonearm-head"></div>
          </div>
        </div>
      </div>

      <div class="now-playing">
        <div class="np-eyebrow"><span class="np-led" id="npLed"></span>Now selected</div>
        <div class="np-title" id="npTitle">—</div>
        <div class="np-artist" id="npArtist"></div>
        <div class="np-meta" id="npMeta"></div>
      </div>

      <div class="controls">
        <button class="btn btn-play" id="btnPlay" onclick="togglePlay()">&#9654; Play</button>
        <button class="btn btn-shuffle" id="btnShuffle" onclick="shuffleRecord()" title="Random record">&#8635;</button>
        <div class="vu" id="vu">
          <div class="vu-b" style="height:6px"></div>
          <div class="vu-b" style="height:12px"></div>
          <div class="vu-b" style="height:8px"></div>
          <div class="vu-b" style="height:18px"></div>
          <div class="vu-b" style="height:10px"></div>
          <div class="vu-b" style="height:20px"></div>
          <div class="vu-b" style="height:7px"></div>
          <div class="vu-b" style="height:15px"></div>
        </div>
      </div>

      <button class="btn btn-tidal" id="btnTidal" onclick="openTidal()" style="width:100%; padding:11px;">
        &#9651; Open in TIDAL
      </button>

      <div class="ticker">
        <span class="ticker-inner" id="tickerText">
          VINYLVAULT &middot; YOUR COLLECTION &middot; 696 RECORDS &middot; SELECT A RECORD TO BEGIN &middot;
        </span>
      </div>
    </div>

    <!-- Right: Library -->
    <div class="library">
      <div class="search-row">
        <input class="search-input" type="text" placeholder="search artist or title..." id="searchInput" oninput="filterRecords()">
        <select class="sort-select" id="sortSel" onchange="filterRecords()">
          <option value="artist">A–Z artist</option>
          <option value="title">A–Z title</option>
          <option value="year">by year</option>
        </select>
      </div>
      <div class="rec-count" id="recCount">696 records</div>
      <div class="record-list" id="recordList"></div>
    </div>
  </div>
</div>

  return LABEL_COLORS[Math.abs(h) % LABEL_COLORS.length];
}

function filterRecords() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const s = document.getElementById('sortSel').value;
  filtered = RECORDS.filter(r => r.artist.toLowerCase().includes(q) || r.title.toLowerCase().includes(q));
  if (s === 'artist') filtered.sort((a,b) => a.artist.localeCompare(b.artist));
  else if (s === 'title') filtered.sort((a,b) => a.title.localeCompare(b.title));
  else filtered.sort((a,b) => (a.year||'0').localeCompare(b.year||'0'));
  renderList();
  document.getElementById('recCount').textContent = filtered.length + ' records';
}

function renderList() {
  const list = document.getElementById('recordList');
  list.innerHTML = filtered.map(r => {
    const idx = RECORDS.indexOf(r);
    const active = r === currentRecord ? ' active' : '';
    return `<div class="rrow${active}" onclick="selectRecord(${idx})">
      <div class="rrow-info">
        <div class="rrow-title">${r.title}</div>
        <div class="rrow-artist">${r.artist}</div>
      </div>
      <div class="rrow-year">${r.year||'—'}</div>
    </div>`;
  }).join('');
}

function selectRecord(idx) {
  currentRecord = RECORDS[idx];
  const col = getLabelColor(currentRecord.artist);
  document.getElementById('recordLabel').style.background = col;
  const st = currentRecord.title.length > 22 ? currentRecord.title.slice(0,20)+'…' : currentRecord.title;
  const sa = currentRecord.artist.length > 18 ? currentRecord.artist.slice(0,16)+'…' : currentRecord.artist;
  document.getElementById('labelTitle').textContent = st;
  document.getElementById('labelArtist').textContent = sa;
  document.getElementById('npTitle').textContent = currentRecord.title;
  document.getElementById('npArtist').textContent = currentRecord.artist;
  document.getElementById('npMeta').textContent = [currentRecord.label, currentRecord.year].filter(Boolean).join(' · ');
  document.getElementById('tickerText').textContent =
    'NOW SPINNING: ' + currentRecord.artist.toUpperCase() + ' — ' + currentRecord.title.toUpperCase() +
    (currentRecord.year ? ' · ' + currentRecord.year : '') +
    (currentRecord.label ? ' · ' + currentRecord.label.toUpperCase() : '') +
    ' · VINYLVAULT · ';
  if (!isPlaying) startPlaying();
  renderList();
}

function startPlaying() {
  isPlaying = true;
  document.getElementById('record').classList.add('spinning');
  document.getElementById('tonearm').classList.add('playing');
  document.getElementById('btnPlay').textContent = '⏹ Stop';
  document.getElementById('btnPlay').classList.add('down');
  document.getElementById('npLed').classList.add('on');
  animateVU();
}

function stopPlaying() {
  isPlaying = false;
  clearTimeout(vuTimer);
  document.getElementById('record').classList.remove('spinning');
  document.getElementById('tonearm').classList.remove('playing');
  document.getElementById('btnPlay').textContent = '▶ Play';
  document.getElementById('btnPlay').classList.remove('down');
  document.getElementById('npLed').classList.remove('on');
  document.querySelectorAll('.vu-b').forEach(b => b.style.height = '3px');
}

function togglePlay() {
  if (!currentRecord) return;
  isPlaying ? stopPlaying() : startPlaying();
}

function animateVU() {
  if (!isPlaying) return;
  const bars = document.querySelectorAll('.vu-b');
  const hs = [5,10,18,8,22,12,20,7,16,4,24,11,14,9];
  bars.forEach(b => {
    const h = hs[Math.floor(Math.random()*hs.length)];
    b.style.height = h + 'px';
    b.style.background = h > 16 ? '#c8962a' : h > 10 ? '#a07020' : '#7a5010';
  });
  vuTimer = setTimeout(animateVU, 110);
}

function shuffleRecord() {
  const btn = document.getElementById('btnShuffle');
  btn.classList.remove('spin-once');
  void btn.offsetWidth;
  btn.classList.add('spin-once');
  btn.addEventListener('animationend', () => btn.classList.remove('spin-once'), { once: true });
  const idx = Math.floor(Math.random() * RECORDS.length);
  selectRecord(idx);
  const list = document.getElementById('recordList');
  const activeRow = list.querySelector('.rrow.active');
  if (activeRow) activeRow.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function openTidal() {
  if (!currentRecord) { alert('Select a record first!'); return; }
  const q = encodeURIComponent(currentRecord.artist + ' ' + currentRecord.title);
  const url = 'https://tidal.com/browse/search/' + q;
  const btn = document.getElementById('btnTidal');
  btn.classList.add('down');
  setTimeout(() => btn.classList.remove('down'), 200);
  window.open(url, '_blank');
}

filterRecords();
</script>
</body>
</html>
